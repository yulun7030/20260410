<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
  <p>姓名：{{ name }}</p>
  <p>年齡：{{ age }}</p>
  <p>自我介紹：{{ name }} 今年 {{ age }} 歲</p>
</div>
 <!-- 引入 Vue -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
Vue.createApp({
  data() {
    return {
      name: "小華",
      age: 20
    }
  }
}).mount("#app")
</script>
</body>
</html>
